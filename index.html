<style>

/* GLOBAL */
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Arial;
  background: #f5f7fb;
  overflow-x: hidden;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  background: white;
  align-items: center;
}

.btn {
  padding: 10px 18px;
  border-radius: 20px;

}

.btn-primary { background:#0066ff; color:white; }
.btn-outline { border:1px solid #0066ff; color:#0066ff; }

/* HERO */
.hero {
  text-align:center;

}

.hero h1 {

}

/* VIDEO SECTION (FIX SCROLL) */
.video-section {
  display:flex;
  gap:15px;
  overflow-x:auto;
  overflow-y:hidden;
  -webkit-overflow-scrolling: touch;
  padding:20px;
}

.video-section::-webkit-scrollbar {
  display:none;
}

.video-card {
  flex:0 0 auto;
  min-width:150px;
  height:250px;
  border-radius:15px;
  overflow:hidden;
  position:relative;
}

.video-card video {
  width:100%;
  height:100%;
  object-fit:cover;
  pointer-events:none; /* FIX SCROLL */
}

.play-btn {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:50px;
  height:50px;
  border-radius:50%;
  background:rgba(0,0,0,0.6);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* STEPS */

  padding:40px 20px;

.step-container {

  flex-wrap:wrap;
  justify-content:center;

.step {

  border-radius:10px;

/* CONTOH */

<script>
function toggleVideo(id){
  const video=document.getElementById(id);
  document.querySelectorAll("video").forEach(v=>{
    if(v!==video) v.pause();
  });
  video.paused ? video.play() : video.pause();
}

function toggleVideoCard(btn){
  const video=btn.parentElement.querySelector("video");
  document.querySelectorAll("video").forEach(v=>{
    if(v!==video) v.pause();
  });
  if(video.paused){
    video.play();
    btn.style.display="none";
  } else {
    video.pause();
    btn.style.display="flex";
  }
  video.onpause=()=>btn.style.display="flex";
}
</script>
